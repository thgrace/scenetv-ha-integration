media_command:
  fields:
    entry_id:
      selector:
        text:
    device_id:
      selector:
        device:
          integration: android_tv_bridge
    command:
      required: true
      selector:
        select:
          options:
            - play
            - pause
            - play_pause
            - stop
            - next
            - previous
            - seek
    seek_position_ms:
      selector:
        number:
          min: 0
          max: 86400000
          mode: box
    timeout_ms:
      selector:
        number:
          min: 1000
          max: 60000
          mode: box

