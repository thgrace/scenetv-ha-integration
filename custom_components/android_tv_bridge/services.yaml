launch_app:
  fields:
    entry_id:
      selector:
        text:
    device_id:
      selector:
        device:
          integration: android_tv_bridge
    package:
      required: true
      selector:
        text:
    timeout_ms:
      selector:
        number:
          min: 1000
          max: 60000
          mode: box

launch_intent:
  fields:
    entry_id:
      selector:
        text:
    device_id:
      selector:
        device:
          integration: android_tv_bridge
    intent_uri:
      required: true
      selector:
        text:
          multiline: true
    timeout_ms:
      selector:
        number:
          min: 1000
          max: 60000
          mode: box

